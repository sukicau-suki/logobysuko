    <style>

        header { height: 55px; display: flex; justify-content: space-between; align-items: center; padding: 0 20px; background-color: #1a1a1a; border-bottom: 1px solid #333; flex-shrink: 0; }

        #canvas {
            width: 85vw; height: 85vw; max-width: 420px; max-height: 420px;

        #textElement {
            color: #fff; position: absolute; top: 50%; left: 50%;

            gap: 8px; padding: 6px 10px; flex-shrink: 0;
            -webkit-overflow-scrolling: touch; touch-action: pan-x;
        }
        #galleryPanel::-webkit-scrollbar { display: none; }
        .gallery-item {
            width: 80px; height: 80px; flex-shrink: 0; border-radius: 8px;
            overflow: hidden; border: 2px solid #333; cursor: pointer;
            transition: border-color 0.15s; touch-action: pan-x;
        }
        .gallery-item.selected { border-color: #1ABC9C; }
        .gallery-item img { width: 100%; height: 100%; object-fit: cover; display: block; pointer-events: none; }
        #toolPanel { display: none; background-color: #1e1e1e; border-top: 1px solid #333; flex-direction: column; flex-shrink: 0; overflow: hidden; }

        .tool-section { display: none; padding: 14px 16px; flex-direction: column; gap: 12px; max-height: 260px; overflow-y: auto; touch-action: pan-y; }
        .tool-section.active { display: flex; }
        .tool-row { display: flex; align-items: center; gap: 10px; }
        .tool-row label { font-size: 11px; font-weight: bold; color: #888; width: 65px; flex-shrink: 0; }
        .tool-row input[type="range"] { flex: 1; accent-color: #1ABC9C; touch-action: pan-x; }
        .tool-row .val { font-size: 11px; color: #ccc; width: 32px; text-align: right; }
        .font-btn { padding: 8px; background: #2a2a2a; border: 1px solid #444; color: #fff; font-size: 12px; border-radius: 4px; cursor: pointer; }
        .font-btn:active { background: #1ABC9C; }
        .spectrum-box { width: 100%; height: 130px; border-radius: 8px; position: relative; cursor: crosshair; touch-action: none; }
        .spectrum-cursor { width: 14px; height: 14px; border-radius: 50%; border: 2px solid #fff; position: absolute; transform: translate(-50%,-50%); pointer-events: none; box-shadow: 0 0 4px rgba(0,0,0,0.9); }
        .hue-bar { width: 100%; height: 18px; border-radius: 9px; position: relative; touch-action: none; background: linear-gradient(to right,#f00,#ff0,#0f0,#0ff,#00f,#f0f,#f00); }
        .hue-cursor { width: 22px; height: 22px; border-radius: 50%; border: 2px solid #fff; position: absolute; top: 50%; transform: translate(-50%,-50%); pointer-events: none; box-shadow: 0 0 4px rgba(0,0,0,0.9); }
        .hex-row { display: flex; align-items: center; gap: 10px; }
        .color-preview { width: 36px; height: 36px; border-radius: 8px; border: 1px solid #555; flex-shrink: 0; }
        .hex-input { flex: 1; background: #2a2a2a; border: 1px solid #444; color: #fff; padding: 8px 12px; border-radius: 8px; font-size: 14px; outline: none; touch-action: auto; -webkit-user-select: text; user-select: text; }
        footer { height: 65px; display: flex; background-color: #1a1a1a; border-top: 1px solid #333; flex-shrink: 0; }
        .tab-item { display: flex; flex-direction: column; align-items: center; justify-content: center; color: #666; cursor: pointer; flex: 1; height: 100%; gap: 4px; }
        .tab-item.active { color: #1ABC9C; }
        .tab-item i { font-size: 18px; }
        .tab-item span { font-size: 10px; font-weight: bold; letter-spacing: 1px; }
        #editModal { display: none; position: fixed; top: 0; left: 0; width: 100vw; height: 100vh; background-color: #23272A; z-index: 100; flex-direction: column; }
        .pl-header { display: flex; padding: 10px; gap: 8px; height: 58px; align-items: stretch; background-color: #1a1a1a; }
        .pl-btn-icon { background-color: #1ABC9C; color: #fff; width: 44px; border: none; display: flex; justify-content: center; align-items: center; font-size: 17px; border-radius: 4px; cursor: pointer; }
        .pl-btn-text { background-color: #1ABC9C; color: #fff; flex: 1; border: none; font-weight: bold; font-size: 13px; letter-spacing: 1px; border-radius: 4px; cursor: pointer; }
        .pl-textarea { flex: 1; background-color: transparent; border: none; color: #fff; padding: 20px; font-size: 24px; resize: none; outline: none; width: 100%; touch-action: auto; -webkit-user-select: text; user-select: text; }
    </style>
</head>

<script>
    document.addEventListener('touchmove', function(e) {
        const t = e.target;
        if (t.tagName === 'TEXTAREA' || t.tagName === 'INPUT' || t.closest('#galleryPanel') || t.closest('.spectrum-box') || t.closest('.hue-bar') || t.closest('.tool-section')) return;
        e.preventDefault();
    }, { passive: false });
    const textEl = document.getElementById('textElement'), canvasEl = document.getElementById('canvas'), toolPanel = document.getElementById('toolPanel');
    let textColor = '#ffffff', strokeColor = '#000000', strokeWidth = 0, strokeOpacity = 1, shadowColor = '#000000', shadowBlur = 0, shadowOpacity = 1, fontSize = 50, letterSpacing = 0, textOpacity = 1;
    function hexToRgba(hex, alpha) { let r=parseInt(hex.slice(1,3),16), g=parseInt(hex.slice(3,5),16), b=parseInt(hex.slice(5,7),16); return 'rgba('+r+','+g+','+b+','+alpha+')'; }
    function hsvToHex(h,s,v) { let r,g,b,i=Math.floor(h/60)%6,f=h/60-Math.floor(h/60),p=v*(1-s),q=v*(1-f*s),t=v*(1-(1-f)*s); switch(i){case 0:r=v,g=t,b=p;break;case 1:r=q,g=v,b=p;break;case 2:r=p,g=v,b=t;break;case 3:r=p,g=q,b=v;break;case 4:r=t,g=p,b=v;break;case 5:r=v,g=p,b=q;break;} return '#'+[r,g,b].map(x=>Math.round(x*255).toString(16).padStart(2,'0')).join(''); }
    function hexToHsv(hex) { let r=parseInt(hex.slice(1,3),16)/255,g=parseInt(hex.slice(3,5),16)/255,b=parseInt(hex.slice(5,7),16)/255,max=Math.max(r,g,b),min=Math.min(r,g,b),d=max-min,h,s=max===0?0:d/max,v=max; if(d===0) h=0; else if(max===r) h=((g-b)/d+6)%6*60; else if(max===g) h=((b-r)/d+2)*60; else h=((r-g)/d+4)*60; return {h,s,v}; }
    function applyAll() { textEl.style.color = textColor; textEl.style.opacity = textOpacity; textEl.style.fontSize = fontSize + 'px'; textEl.style.letterSpacing = letterSpacing + 'px'; textEl.style.webkitTextStroke = strokeWidth + 'px ' + hexToRgba(strokeColor, strokeOpacity); textEl.style.textShadow = '0 0 ' + shadowBlur + 'px ' + hexToRgba(shadowColor, shadowOpacity); }
    function makeColorPicker(ids, onChange) {
        const specBox = document.getElementById(ids.box), specCur = document.getElementById(ids.cursor), hBar = document.getElementById(ids.hue), hCur = document.getElementById(ids.hueCursor), hexInp = document.getElementById(ids.hex), preview = document.getElementById(ids.preview);
        let hue=0, sat=0, val=1;
        function render() { const hex = hsvToHex(hue, sat, val); specBox.style.background = 'linear-gradient(to bottom,rgba(0,0,0,0),#000),linear-gradient(to right,#fff,hsl('+hue+',100%,50%))'; specCur.style.left = (sat*100)+'%'; specCur.style.top = ((1-val)*100)+'%'; specCur.style.background = hex; hCur.style.left = (hue/360*100)+'%'; hCur.style.background = 'hsl('+hue+',100%,50%)'; preview.style.background = hex; hexInp.value = hex; onChange(hex); }
        function dragBind(el, cb) { let on = false; function go(ex, ey) { const r=el.getBoundingClientRect(); cb(ex,ey,r); } el.addEventListener('touchstart', e=>{ on=true; go(e.touches[0].clientX,e.touches[0].clientY); }, {passive:true}); el.addEventListener('touchmove', e=>{ if(on) go(e.touches[0].clientX,e.touches[0].clientY); }, {passive:true}); el.addEventListener('touchend', ()=>on=false); el.addEventListener('mousedown', e=>{ on=true; go(e.clientX,e.clientY); }); window.addEventListener('mousemove', e=>{ if(on) go(e.clientX,e.clientY); }); window.addEventListener('mouseup', ()=>on=false); }
        dragBind(hBar, (ex,ey,r) => { hue = Math.max(0,Math.min(1,(ex-r.left)/r.width))*360; render(); });
        dragBind(specBox, (ex,ey,r) => { sat = Math.max(0,Math.min(1,(ex-r.left)/r.width)); val = 1-Math.max(0,Math.min(1,(ey-r.top)/r.height)); render(); });
        hexInp.addEventListener('input', e => { if(/^#[0-9a-fA-F]{6}$/.test(e.target.value)) { const hsv = hexToHsv(e.target.value); hue=hsv.h; sat=hsv.s; val=hsv.v; render(); } });
        render();
    }
    makeColorPicker({ box:'spectrumBox', cursor:'spectrumCursor', hue:'hueBar', hueCursor:'hueCursor', hex:'hexInput', preview:'colorPreview' }, hex => { textColor=hex; applyAll(); });
    makeColorPicker({ box:'spectrumBoxStroke', cursor:'spectrumCursorStroke', hue:'hueBarStroke', hueCursor:'hueCursorStroke', hex:'hexInputStroke', preview:'colorPreviewStroke' }, hex => { strokeColor=hex; applyAll(); });
    makeColorPicker({ box:'spectrumBoxShadow', cursor:'spectrumCursorShadow', hue:'hueBarShadow', hueCursor:'hueCursorShadow', hex:'hexInputShadow', preview:'colorPreviewShadow' }, hex => { shadowColor=hex; applyAll(); });
    sliderBind('inpFontSize','valFontSize', v=>{fontSize=v;applyAll();}); sliderBind('inpLetterSpacing','valLetterSpacing', v=>{letterSpacing=v;applyAll();}); sliderBind('inpTextOpacity','valTextOpacity', v=>{textOpacity=v;applyAll();}, v=>Math.round(v*100)+'%'); sliderBind('inpStrokeWidth','valStrokeWidth', v=>{strokeWidth=v;applyAll();}); sliderBind('inpStrokeOpacity','valStrokeOpacity', v=>{strokeOpacity=v;applyAll();}, v=>Math.round(v*100)+'%'); sliderBind('inpShadowBlur','valShadowBlur', v=>{shadowBlur=v;applyAll();}); sliderBind('inpShadowOpacity','valShadowOpacity', v=>{shadowOpacity=v;applyAll();}, v=>Math.round(v*100)+'%');
    function sliderBind(id, valId, cb, fmt) { const el=document.getElementById(id), vEl=document.getElementById(valId); el.addEventListener('input', ()=>{ vEl.textContent=fmt?fmt(el.value):el.value; cb(parseFloat(el.value)); }); }
    async function loadFont(name, url) { try { const font = new FontFace(name, 'url("'+url+'")'); await font.load(); document.fonts.add(font); textEl.style.fontFamily = name; } catch(e) { alert('Gagal memuat font'); } }
    document.querySelectorAll('.tool-tab').forEach(tab => { tab.addEventListener('click', function() { document.querySelectorAll('.tool-tab').forEach(t=>t.classList.toggle('active',t===this)); document.querySelectorAll('.tool-section').forEach(s=>s.classList.toggle('active',s.id==='sec-'+this.dataset.tab)); }); });
    let activeFooterTab = null;
    function footerTabToggle(tabKey, btnEl) {
        document.querySelectorAll('.tab-item').forEach(t=>t.classList.remove('active'));
        if (activeFooterTab === tabKey) { toolPanel.style.display = 'none'; activeFooterTab = null; return; }
        btnEl.classList.add('active'); activeFooterTab = tabKey; toolPanel.style.display = 'flex'; document.querySelectorAll('.tool-tab').forEach(t=>t.classList.toggle('active',t.dataset.tab===tabKey)); document.querySelectorAll('.tool-section').forEach(s=>s.classList.toggle('active',s.id==='sec-'+tabKey));
    }
    document.getElementById('btnText').addEventListener('click', function(){ footerTabToggle('color',this); }); document.getElementById('btnFont').addEventListener('click', function(){ footerTabToggle('font',this); }); document.getElementById('btnStroke').addEventListener('click', function(){ footerTabToggle('stroke',this); }); document.getElementById('btnShadow').addEventListener('click', function(){ footerTabToggle('shadow',this); });
    document.getElementById('btnEdit').addEventListener('click', () => { toolPanel.style.display='none'; activeFooterTab=null; document.querySelectorAll('.tab-item').forEach(t=>t.classList.remove('active')); document.getElementById('textInput').value = textEl.innerText; document.getElementById('editModal').style.display = 'flex'; setTimeout(()=>document.getElementById('textInput').focus(), 100); });
    document.getElementById('btnCancelEdit').addEventListener('click', ()=>{ document.getElementById('editModal').style.display='none'; }); document.getElementById('plBtnTrash').addEventListener('click', ()=>{ document.getElementById('textInput').value=''; }); document.getElementById('btnOkEdit').addEventListener('click', ()=>{ const v=document.getElementById('textInput').value.trim(); if(v!=='') textEl.innerText=v; document.getElementById('editModal').style.display='none'; });
    function setBackground(el, url) { document.querySelectorAll('.gallery-item').forEach(item=>item.classList.remove('selected')); el.classList.add('selected'); const bgImg = document.getElementById('bgImage'); bgImg.src = url; bgImg.style.display = 'block'; canvasEl.style.background = 'none'; }
    document.querySelectorAll('.gallery-item').forEach(item=>{ item.addEventListener('click', function(){ setBackground(this,this.dataset.url); }); });
    let currentX=0,currentY=0,currentScale=1,currentAngle=0,startX,startY,initialDistance,initialScale,initialAngleTouch,initialAngle,isDragging=false;
    function getAngle(t1,t2){ return Math.atan2(t2.clientY-t1.clientY,t2.clientX-t1.clientX)*(180/Math.PI); }
    function updateTransform(){ textEl.style.transform='translate(-50%,-50%) translate('+currentX+'px,'+currentY+'px) scale('+currentScale+') rotate('+currentAngle+'deg)'; }
    canvasEl.addEventListener('touchstart', e=>{ e.preventDefault(); if(e.touches.length===1){ isDragging=true; startX=e.touches[0].clientX-currentX; startY=e.touches[0].clientY-currentY; } else if(e.touches.length===2){ isDragging=false; initialDistance=Math.hypot(e.touches[0].clientX-e.touches[1].clientX,e.touches[0].clientY-e.touches[1].clientY); initialScale=currentScale; initialAngleTouch=getAngle(e.touches[0],e.touches[1]); initialAngle=currentAngle; } });
    canvasEl.addEventListener('touchmove', e=>{ e.preventDefault(); if(e.touches.length===1&&isDragging){ currentX=e.touches[0].clientX-startX; currentY=e.touches[0].clientY-startY; updateTransform(); } else if(e.touches.length===2){ let d=Math.hypot(e.touches[0].clientX-e.touches[1].clientX,e.touches[0].clientY-e.touches[1].clientY); currentScale=initialScale*(d/initialDistance); currentAngle=initialAngle+(getAngle(e.touches[0],e.touches[1])-initialAngleTouch); updateTransform(); } });
    canvasEl.addEventListener('touchend', ()=>isDragging=false);

    document.getElementById('btnSave').addEventListener('click', async () => { 
        let targetScale = 4080 / canvasEl.offsetWidth; 
        canvasEl.style.border = 'none'; 
        
        const btnSaveIcon = document.getElementById('btnSave');
        btnSaveIcon.className = 'fas fa-spinner fa-spin header-icon';

        try {
            const canvas = await html2canvas(canvasEl, {backgroundColor:null, scale:targetScale, useCORS:true});
            canvasEl.style.border = ''; 
            btnSaveIcon.className = 'fas fa-save header-icon'; 

            canvas.toBlob(async (blob) => {
                const file = new File([blob], "LogoBySuki.png", { type: "image/png" });
                
                if (navigator.canShare && navigator.canShare({ files: [file] })) {
                    try {
                        await navigator.share({
                            files: [file],
                            title: 'Logo By Suki',
                        });
                    } catch (error) {
                        fallbackDownload(canvas);
                    }
                } else {
                    fallbackDownload(canvas);
                }
            }, 'image/png');
        } catch (err) {
            alert('Gagal render logo!');
            canvasEl.style.border = '';
            btnSaveIcon.className = 'fas fa-save header-icon';
        }
    });

    function fallbackDownload(canvas) {
        let link=document.createElement('a'); 
        link.download='LogoBySuki.png'; 
        link.href=canvas.toDataURL('image/png'); 
        link.click();
    }

    applyAll();
    if (localStorage.getItem('waFollowed')) waOverlay.style.display = 'none';
    btnFollowWA.addEventListener('click', function() { localStorage.setItem('waFollowed', 'true'); setTimeout(() => { waOverlay.style.display = 'none'; }, 300); });

    if ('serviceWorker' in navigator) {
        window.addEventListener('load', () => {
            navigator.serviceWorker.register('./sw.js').then(reg => {
                reg.addEventListener('updatefound', () => {
                    const newWorker = reg.installing;
                    newWorker.addEventListener('statechange', () => {
                        if (newWorker.state === 'installed' && navigator.serviceWorker.controller) {
                            window.location.reload(); 
                        }
                    });
                });
            });
            let refreshing;
            navigator.serviceWorker.addEventListener('controllerchange', () => {
                if (refreshing) return;
                refreshing = true;
                window.location.reload();
            });
        });
    }
</script>
</body>
</html>
